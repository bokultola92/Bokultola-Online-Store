<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বকুলতলা - প্রিমিয়াম অনলাইন শপিং</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: rgba(43, 122, 120, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.35);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            --text-main: #1e293b;
            --primary-color: #0d9488;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Glassmorphism Header */
        header {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo-area img {
            height: 85px;
            width: 85px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(13, 148, 136, 0.4);
            border: 2px solid white;
        }

        .logo-area h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(45deg, #0f172a, #0d9488);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(15, 23, 42, 0.55), rgba(15, 23, 42, 0.55)), 
                        url('https://images.unsplash.com/photo-1472851294608-062f824d29cc?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
            padding: 130px 20px;
            margin-bottom: 50px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .hero-text-content {
            display: inline-block;
            max-width: 800px;
        }

        .hero h2 {
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 2px 15px rgba(0,0,0,0.6);
        }

        .hero p {
            font-size: 20px;
            font-weight: 400;
            color: #f1f5f9;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }

        /* Container & Section Styling */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #0f172a;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 40px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        /* Product Card */
        .product-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(13, 148, 136, 0.15);
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(13, 148, 136, 0.3);
        }

        .product-img-wrapper {
            position: relative;
            overflow: hidden;
            padding-top: 100%;
        }

        .product-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.06);
        }

        .discount-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(255,71,87,0.3);
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #0f172a;
            line-height: 1.3;
        }

        .product-desc {
            font-size: 14px;
            color: #475569;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .price-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .current-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .old-price {
            font-size: 15px;
            color: #94a3b8;
            text-decoration: line-through;
        }

        .buy-btn {
            background: linear-gradient(135deg, #0d9488, #0f766e);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            display: block;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.25);
        }

        .buy-btn:hover {
            background: linear-gradient(135deg, #0f766e, #115e59);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
            transform: translateY(-1px);
        }

        .buy-btn i {
            margin-right: 6px;
        }

        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(37, 211, 102, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .whatsapp-float:hover {
            transform: scale(1.15) rotate(10deg);
            background: rgba(37, 211, 102, 1);
        }

        .loader {
            text-align: center;
            font-size: 18px;
            padding: 50px;
            color: var(--primary-color);
            grid-column: 1/-1;
        }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo-area">
                <img src="https://i.postimg.cc/657snhn5/20260506-224345.jpg" alt="বকুলতলা লোগো">
                <h1>বকুলতলা</h1>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-text-content">
            <h2>বকুলতলা ই-কমার্স কর্নার</h2>
            <p>সেরা মূল্যে আধুনিক ও প্রিমিয়াম লাইফস্টাইল পণ্য</p>
        </div>
    </section>

    <main class="container">
        <h3 class="section-title">আমাদের এক্সক্লুসিভ কালেকশন</h3>
        <div class="product-grid" id="product-container">
            <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> প্রোডাক্ট লোড হচ্ছে...</div>
        </div>
    </main>

    <a href="https://wa.me/+8801305579094" class="whatsapp-float" target="_blank" title="সরাসরি কথা বলুন">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const TELEGRAM_BOT_TOKEN = '7265940573:AAEviCMNGTEsloUHd4BkkwJVGj80PI2gLW4';
        const TARGET_CHAT_ID = 6214455402; 
        let lastUpdateId = 0;
        let products = [];

        // গ্লোবাল মেমরিতে ডেটা শেয়ার করার জন্য ব্রাউজার রিলোড হলেও ক্যাশ রিড করবে
        if(localStorage.getItem('bakultala_products')) {
            products = JSON.parse(localStorage.getItem('bakultala_products'));
            renderProducts();
        }

        async function fetchTelegramUpdates() {
            try {
                // offset ০ করে দেওয়া হয়েছে যেন সব ভিজিটর ব্রাউজার ওপেন করলেই ডেটা দেখতে পান
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await response.json();

                if (data.ok && data.result.length > 0) {
                    let updated = false;
                    for (let update of data.result) {
                        lastUpdateId = update.update_id;
                        
                        // চ্যাট আইডি ও পাসওয়ার্ড ফিল্টারিং সুরক্ষাব্যবস্থা
                        if (update.message && update.message.chat && update.message.chat.id === TARGET_CHAT_ID && update.message.text) {
                            const success = parseAndAddProduct(update.message.text);
                            if(success) updated = true;
                        }
                    }
                    if(updated) {
                        renderProducts();
                    }
                }
            } catch (error) {
                console.error("Error fetching updates:", error);
            }
        }

        function parseAndAddProduct(text) {
            if(!text.includes('/pass:any/awal')) return false;

            try {
                const nameMatch = text.match(/\/name:\s*(.+)/i);
                const productMatch = text.match(/\/product:\s*(https?:\/\/[^\s]+)/i);
                const descMatch = text.match(/\/description:\s*(.+)/i);
                const priceMatch = text.match(/\/price:\s*(\d+)/i);
                const discountMatch = text.match(/\/discount:\s*(\d+)/i);

                if (nameMatch && productMatch && descMatch && priceMatch) {
                    const newProduct = {
                        id: Date.now(),
                        name: nameMatch[1].trim(),
                        image: productMatch[1].trim(),
                        description: descMatch[1].trim(),
                        price: parseInt(priceMatch[1]),
                        discount: discountMatch ? parseInt(discountMatch[1]) : null
                    };

                    // ডুপ্লিকেট এন্ট্রি চেক
                    if (!products.some(p => p.name === newProduct.name && p.description === newProduct.description)) {
                        products.unshift(newProduct); 
                        localStorage.setItem('bakultala_products', JSON.stringify(products));
                        return true;
                    }
                }
            } catch (e) {
                console.log("Parsing error inside checker.");
            }
            return false;
        }

        function renderProducts() {
            const container = document.getElementById('product-container');
            if(!container) return;
            
            container.innerHTML = '';

            if(products.length === 0) {
                container.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:#64748b; padding:40px;">বর্তমানে কোনো পণ্য লাইভ নেই। টেলিগ্রাম বট থেকে পোস্ট করুন!</p>`;
                return;
            }

            products.forEach(product => {
                let finalPrice = product.price;
                let oldPriceHTML = '';
                let discountHTML = '';

                if (product.discount) {
                    finalPrice = product.price - product.discount;
                    oldPriceHTML = `<span class="old-price">৳${product.price}</span>`;
                    discountHTML = `<div class="discount-tag">৳${product.discount} অফ</div>`;
                }

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    ${discountHTML}
                    <div class="product-img-wrapper">
                        <img class="product-img" src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x400?text=Image+Not+Found'">
                    </div>
                    <div class="product-info">
                        <div>
                            <h4 class="product-title">${product.name}</h4>
                            <p class="product-desc">${product.description}</p>
                        </div>
                        <div>
                            <div class="price-area">
                                <span class="current-price">৳${finalPrice}</span>
                                ${oldPriceHTML}
                            </div>
                            <a href="https://wa.me/+8801305579094?text=হ্যালো, আমি এই প্রিমিয়াম প্রোডাক্টটি অর্ডার করতে চাই:%0A%0A📦 পণ্যের নাম: ${product.name}%0A💰 মূল্য: ৳${finalPrice}" target="_blank" class="buy-btn">
                                <i class="fas fa-shopping-bag"></i> এখনই কিনুন
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // প্রতি ৩ সেকেন্ড পর পর গ্লোবাল ব্যাকএন্ড চেক হবে রিয়েল-টাইমে
        setInterval(fetchTelegramUpdates, 3000);
        fetchTelegramUpdates();
    </script>
</body>
</html>
